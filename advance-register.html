<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Advance Register</title>

<link rel="stylesheet"
href="css/advance-register.css">

</head>

<body>

<div class="container">

<h2>💰 Advance Register</h2>

<!-- Search Member -->

<div class="card">

<h3>Search Member</h3>

<input
type="text"
id="searchMember"
placeholder="Search Member Code / Name / Mobile">

<div id="memberList"></div>

</div>

<!-- Selected Member -->

<div
class="card"
id="memberCard"
style="display:none;">

<h3>Member Details</h3>

<div class="grid">

<div>

<label>Member Code</label>

<input
type="text"
id="memberCode"
readonly>

</div>

<div>

<label>Member Name</label>

<input
type="text"
id="memberName"
readonly>

</div>

<div>

<label>Mobile Number</label>

<input
type="text"
id="mobileNumber"
readonly>

</div>

<div>

<label>Address</label>

<input
type="text"
id="address"
readonly>

</div>

</div>

</div>

<!-- Advance Details -->

<div class="card">

<h3>Advance Details</h3>

<div class="grid">

<div>

<label>Advance No</label>

<input
type="text"
id="advanceNo"
readonly>

</div>

<div>

<label>Advance Date</label>

<input
type="date"
id="advanceDate">

</div>

<div>

<label>Advance Amount</label>

<input
type="number"
id="advanceAmount"
placeholder="Enter Amount">

</div>

<div>

<label>Due Date</label>

<input
type="date"
id="dueDate">

</div>

<div>

<label>Payment Mode</label>

<select id="paymentMode">

<option>Cash</option>

<option>UPI</option>

<option>Bank</option>

<option>Cheque</option>

</select>

</div>

<div>

<label>Remarks</label>

<input
type="text"
id="remarks"
placeholder="Remarks">

</div>

</div>

</div>

<!-- Buttons -->

<div class="buttons">

<button
id="saveAdvance">

💾 Save Advance

</button>

<button
onclick="history.back()">

⬅ Back

</button>

</div>

</div>

<script
type="module"
src="js/advance-register.js"></script>

</body>

</html>
