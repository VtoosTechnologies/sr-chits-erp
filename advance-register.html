<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Advance Register</title>

<link rel="stylesheet"
href="advance-register.css">

</head>

<body>

<div class="container">

<h2>Advance Register</h2>

<div class="card">

<div class="row">

<div class="form-group">

<label>Advance No</label>

<input
type="text"
id="advanceNo"
readonly>

</div>

<div class="form-group">

<label>Advance Date</label>

<input
type="date"
id="advanceDate">

</div>

</div>

<div class="row">

<div class="form-group">

<label>Customer Code</label>

<input
type="text"
id="customerCode"
placeholder="Customer Code">

</div>

<div class="form-group">

<label>Customer Name</label>

<input
type="text"
id="customerName"
placeholder="Customer Name">

</div>

</div>

<div class="row">

<div class="form-group">

<label>Mobile Number</label>

<input
type="text"
id="mobileNumber"
maxlength="10"
placeholder="Mobile Number">

</div>

<div class="form-group">

<label>Address</label>

<input
type="text"
id="address"
placeholder="Address">

</div>

</div>

<div class="row">

<div class="form-group">

<label>Advance Amount</label>

<input
type="number"
id="advanceAmount"
placeholder="0">

</div>

<div class="form-group">

<label>Due Date</label>

<input
type="date"
id="dueDate">

</div>

</div>

<div class="row">

<div class="form-group">

<label>Payment Mode</label>

<select id="paymentMode">

<option value="Cash">Cash</option>

<option value="UPI">UPI</option>

<option value="Bank">Bank</option>

</select>

</div>

<div class="form-group">

<label>Remarks</label>

<input
type="text"
id="remarks"
placeholder="Remarks">

</div>

</div>

<div class="button-area">

<button id="saveAdvance">
Save Advance
</button>

</div>

</div>

</div>

<script
type="module"
src="advance-register.js">
</script>

</body>
</html>
