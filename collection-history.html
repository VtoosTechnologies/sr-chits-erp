<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Collection History</title>

<link rel="stylesheet"
href="css/collection-history.css">

</head>

<body>

<div class="container">

<h1>Collection History</h1>

<!--========================================-->
<!-- Filters -->
<!--========================================-->

<div class="card">

<label>Chit Amount</label>

<select id="chitAmountFilter">

<option value="">
Select Chit Amount
</option>

</select>

<label>Auction Day</label>

<select id="auctionDayFilter">

<option value="">
Select Auction Day
</option>

</select>

<label>Collection Month</label>

<select id="collectionMonthFilter">

<option value="">
Select Collection Month
</option>

</select>

<button id="loadHistory">
Load History
</button>

</div>

<!--========================================-->
<!-- Summary -->
<!--========================================-->

<div class="card">

<h2>Summary</h2>

<div class="info-row">

<span>Total Collections</span>

<strong id="totalCollections">
0
</strong>

</div>

<div class="info-row">

<span>Total Monthly Amount</span>

<strong id="totalMonthly">
₹0
</strong>

</div>

<div class="info-row">

<span>Total Fine Amount</span>

<strong id="totalFine">
₹0
</strong>

</div>

<div class="info-row">

<span>Total Collection Amount</span>

<strong id="totalAmount">
₹0
</strong>

</div>

<div class="info-row">

<span>Pending Members</span>

<strong id="pendingMembers">
0
</strong>

</div>

</div>
<!--========================================-->
<!-- Collection History -->
<!--========================================-->

<div class="card">

<h2>Collection History</h2>

<div class="table-container">

<table>

<thead>

<tr>

<th>S.No</th>
<th>Member Code</th>
<th>Member Name</th>
<th>Month</th>
<th>Monthly</th>
<th>Fine</th>
<th>Total</th>
<th>Collection Date</th>
<th>Payment</th>
<th>Action</th>

</tr>

</thead>

<tbody id="historyTable">

<tr>

<td colspan="10"
style="text-align:center;">

No Collection History Found

</td>

</tr>

</tbody>

</table>

</div>

</div>

<!--========================================-->
<!-- Buttons -->
<!--========================================-->

<div class="button-group">

<button
id="backButton"
onclick="history.back();">

⬅ Back To Dashboard

</button>

</div>

</div>

<script type="module"
src="js/collection-history.js"></script>

</body>

</html>
