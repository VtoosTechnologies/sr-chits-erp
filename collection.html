<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Collection Entry</title>

<link rel="stylesheet"
href="css/collection.css">

</head>

<body>

<div class="container">

<h1>Collection Entry</h1>

<!--==============================-->
<!-- Filters -->
<!--==============================-->

<div class="card">

<label>Chit Amount</label>

<select id="chitAmountFilter">

<option value="">
Select Chit Amount
</option>

</select>

<label>Auction Day</label>

<select id="auctionDayFilter">

<option value="">
Select Auction Day
</option>

</select>

</div>

<!--==============================-->
<!-- Group Details -->
<!--==============================-->

<div class="card">

<h2>Group Details</h2>

<div class="info-row">

<span>Group Code</span>

<strong id="groupCode">-</strong>

</div>

<div class="info-row">

<span>Group Name</span>

<strong id="groupName">-</strong>

</div>

<div class="info-row">

<span>Total Members</span>

<strong id="totalMembers">-</strong>

</div>

<div class="info-row">

<span>Current Collection Month</span>

<strong id="currentMonth">-</strong>

</div>

</div>

<!--==============================-->
<!-- Member -->
<!--==============================-->

<div class="card">

<label>Select Member</label>

<select id="member">

<option value="">
Select Member
</option>

</select>

<div class="info-row">

<span>Member Code</span>

<strong id="memberCode">-</strong>

</div>

<div class="info-row">

<span>Member Name</span>

<strong id="memberName">-</strong>

</div>

<div class="info-row">

<span>Mobile Number</span>

<strong id="mobileNumber">-</strong>

</div>

</div>
<!--==============================-->
<!-- Collection Entry -->
<!--==============================-->

<div class="card">

<h2>Collection Details</h2>

<label>Collection Month</label>

<input
type="text"
id="collectionMonth"
readonly>

<label>Monthly Amount</label>

<input
type="number"
id="monthlyAmount"
readonly>

<label>Fine Amount</label>

<input
type="number"
id="fineAmount"
value="0"
min="0">

<label>Total Amount</label>

<input
type="number"
id="totalAmount"
readonly>

<label>Collection Date</label>

<input
type="date"
id="collectionDate">

<label>Payment Mode</label>

<select id="paymentMode">

<option value="Cash">
Cash
</option>

<option value="UPI">
UPI
</option>

<option value="Bank Transfer">
Bank Transfer
</option>

</select>

<label>Remarks</label>

<textarea
id="remarks"
rows="4"
placeholder="Enter Remarks"></textarea>

</div>

<!--==============================-->
<!-- Action Buttons -->
<!--==============================-->

<div class="button-group">

<button id="saveCollection">

Save Collection

</button>

<button
type="button"
onclick="history.back()">

Back To Dashboard

</button>

</div>

</div>

<script
type="module"
src="js/collection.js"></script>

</body>

</html>
