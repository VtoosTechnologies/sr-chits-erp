<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SR Chits ERP - Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

    <div class="dashboard">

        <div class="header">

            <h1>SR Chits ERP</h1>

            <p>Welcome, Owner 👋</p>

        </div>

        <div class="cards">

            <div class="card">
                <h2>Total Members</h2>
                <h3 id="totalMembers">0</h3>
            </div>

            <div class="card">
                <h2>Total Groups</h2>
                <h3 id="totalGroups">0</h3>
            </div>

            <div class="card">
                <h2>Today's Collection</h2>
                <h3 id="todayCollection">₹0</h3>
            </div>

            <div class="card">
                <h2>Total Staff</h2>
                <h3 id="totalStaff">0</h3>
            </div>

        </div>

        <div class="menu">

            <button onclick="location.href='groups.html'">
                Groups
            </button>

            <button onclick="location.href='members.html'">
                Members
            </button>

            <button onclick="location.href='auction.html'">
                Auction
            </button>

        </div>

        <button id="logoutBtn">
            Logout
        </button>

    </div>

    <script type="module" src="js/dashboard.js"></script>

</body>

</html>
