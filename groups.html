<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SR Chits ERP - Groups</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/groups.css">

</head>

<body>

<div class="container">

<h1>Groups Management</h1>

<div class="group-form">

<input
type="number"
id="chitAmount"
placeholder="Chit Amount">

<input
type="number"
id="totalMembers"
placeholder="Total Members">

<input
type="number"
id="duration"
placeholder="Duration (Months)">

<input
type="number"
id="auctionDay"
placeholder="Auction Day (1-31)"
min="1"
max="31">

<label>Start Date</label>

<input
type="date"
id="startDate">

<div class="checkbox-container">

<label>

<input
type="checkbox"
id="fixedMonthly">

Fixed Monthly Installment

</label>

</div>

<input
type="number"
id="monthlyAmount"
placeholder="Monthly Amount"
disabled>

<select id="status">

<option value="Active">
Active
</option>

<option value="Closed">
Closed
</option>

</select>

<button id="saveGroupBtn">

Save Group

</button>

</div>

<hr>

<h2>Groups List</h2>

<div id="groupsList">

<!-- Groups will be loaded here -->

</div>

</div>

<script type="module" src="js/groups.js"></script>

</body>

</html>
