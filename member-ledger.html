<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Member Ledger</title>

<link rel="stylesheet" href="css/member-ledger.css">

</head>

<body>

<div class="container">

    <h2>📒 Member Ledger</h2>

    <!-- Search Member -->

    <div class="card">

        <h3>Search Member</h3>

        <input
            type="text"
            id="searchMember"
            placeholder="Search Member Name / Member Code / Mobile">

        <div id="memberList"></div>

    </div>

    <!-- Selected Member -->

    <div
        class="card"
        id="selectedMemberCard"
        style="display:none;">

        <h3>Member Details</h3>

        <p>
            <b>Member Code :</b>
            <span id="memberCode">-</span>
        </p>

        <p>
            <b>Member Name :</b>
            <span id="memberName">-</span>
        </p>

        <p>
            <b>Mobile :</b>
            <span id="memberMobile">-</span>
        </p>

    </div>

    <!-- Summary -->

    <div class="summary">

        <div class="box">

            <h4>Total Debit</h4>

            <p id="totalDebit">₹0</p>

        </div>

        <div class="box">

            <h4>Total Credit</h4>

            <p id="totalCredit">₹0</p>

        </div>

        <div class="box">

            <h4>Outstanding</h4>

            <p id="closingBalance">₹0</p>

        </div>

    </div>

    <!-- Ledger -->

    <div class="card">

        <h3>Ledger History</h3>

        <table>

            <thead>

                <tr>

                    <th>Date</th>

                    <th>Type</th>

                    <th>Group</th>

                    <th>Debit</th>

                    <th>Credit</th>

                    <th>Balance</th>

                </tr>

            </thead>

            <tbody id="ledgerBody">

                <tr>

                    <td colspan="6">

                        Search a Member

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

    <div class="buttons">

        <button id="printBtn">

            🖨 Print

        </button>

        <button onclick="history.back()">

            ⬅ Back

        </button>

    </div>

</div>

<script
type="module"
src="js/member-ledger.js"></script>

</body>

</html>
