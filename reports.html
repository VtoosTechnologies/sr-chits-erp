<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Reports</title>

<link rel="stylesheet"
href="css/reports.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

<h2>📊 Reports</h2>

<p class="subtitle">

View, Print & Download All Reports

</p>

<div class="search-box">

<input
type="text"
id="reportSearch"
placeholder="🔍 Search Reports...">

</div>

<div class="report-list">

<div class="report-item">

<span>📋 Collection Report</span>

<button
onclick="openCollectionReport()">

👁 View

</button>

</div>

<div class="report-item">

<span>👤 Member Statement</span>

<button
onclick="openMemberStatement()">

👁 View

</button>

</div>

<div class="report-item">

<span>🏆 Prize Payment Report</span>

<button
onclick="openPrizePaymentReport()">

👁 View

</button>

</div>

<div class="report-item">

<span>💰 Cash Book</span>

<button
onclick="openCashBook()">

👁 View

</button>

</div>

<div class="report-item">

<span>📈 Outstanding Report</span>

<button
onclick="openOutstandingReport()">

👁 View

</button>

</div>

<div class="report-item">

<span>💵 Advance Report</span>

<button
onclick="openAdvanceReport()">

👁 View

</button>

</div>

</div>

</div>

<script type="module"
src="js/reports.js"></script>

</body>

</html>
